<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wibilow Admin</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D1117;--surface:#161B22;--surface2:#1C2128;--border:#30363D;
  --blue:#58A6FF;--cyan:#3DFFD0;--white:#F0F6FF;--muted:#8B949E;
  --green:#3DFFD0;--red:#FF6B6B;--yellow:#E3A008;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--white);font-family:'Inter',sans-serif;min-height:100vh;}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:40px;width:100%;max-width:360px;text-align:center;}
.login-logo{font-family:'JetBrains Mono',monospace;font-size:1.4rem;font-weight:700;margin-bottom:8px;}
.login-logo .w{color:var(--blue);}.login-logo .l{color:var(--cyan);}
.login-sub{color:var(--muted);font-size:0.85rem;margin-bottom:28px;}
.login-input{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--white);font-family:'Inter',sans-serif;font-size:0.9rem;
  outline:none;margin-bottom:12px;}
.login-input:focus{border-color:var(--blue);}
.login-btn{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;
  border-radius:8px;font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:600;
  cursor:pointer;transition:background 0.2s;}
.login-btn:hover{background:#388BFD;}
.login-error{color:var(--red);font-size:0.82rem;margin-top:8px;display:none;}

/* ADMIN */
#adminScreen{display:none;padding:24px;}
.admin-header{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.admin-logo{font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:700;}
.admin-logo .w{color:var(--blue);}.admin-logo .l{color:var(--cyan);}
.admin-badge{background:rgba(61,255,208,0.1);color:var(--cyan);border:1px solid rgba(61,255,208,0.3);
  padding:4px 12px;border-radius:999px;font-size:0.75rem;font-weight:600;}
.logout-btn{background:transparent;color:var(--muted);border:1px solid var(--border);
  padding:6px 14px;border-radius:6px;font-size:0.82rem;cursor:pointer;font-family:'Inter',sans-serif;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:1.4rem;font-weight:700;color:var(--cyan);}
.stat-lbl{font-size:0.75rem;color:var(--muted);margin-top:4px;}

/* FILTERS */
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.filter-input{background:var(--surface);border:1px solid var(--border);border-radius:6px;
  padding:7px 12px;color:var(--white);font-family:'Inter',sans-serif;font-size:0.85rem;outline:none;}
.filter-input:focus{border-color:var(--blue);}
select.filter-input option{background:var(--surface);}

/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:0.82rem;}
thead{background:var(--surface2);}
th{padding:10px 12px;text-align:left;font-size:0.72rem;font-weight:600;
  color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);}
td{padding:10px 12px;border-bottom:1px solid rgba(48,54,61,0.5);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}
.product-thumb{width:36px;height:36px;border-radius:6px;object-fit:contain;
  background:var(--surface2);border:1px solid var(--border);}
.product-thumb-placeholder{width:36px;height:36px;border-radius:6px;background:var(--surface2);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.product-name{font-weight:600;color:var(--white);max-width:220px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.product-cat{font-size:0.72rem;color:var(--muted);margin-top:2px;}
.mono{font-family:'JetBrains Mono',monospace;}
.price-sell{color:var(--cyan);font-weight:700;}
.price-cost{color:var(--muted);}
.profit{font-weight:700;}
.profit.good{color:var(--green);}
.profit.bad{color:var(--red);}
.profit.ok{color:var(--yellow);}
.cj-link{color:var(--blue);text-decoration:none;font-size:0.78rem;font-family:'JetBrains Mono',monospace;
  display:flex;align-items:center;gap:4px;}
.cj-link:hover{text-decoration:underline;}
.cj-id{font-size:0.72rem;color:var(--muted);font-family:'JetBrains Mono',monospace;
  max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.copy-btn{background:transparent;border:1px solid var(--border);border-radius:4px;
  color:var(--muted);padding:2px 7px;font-size:0.68rem;cursor:pointer;font-family:'Inter',sans-serif;}
.copy-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.stock-badge{padding:2px 8px;border-radius:4px;font-size:0.72rem;font-weight:600;}
.stock-high{background:rgba(61,255,208,0.1);color:var(--cyan);}
.stock-low{background:rgba(255,107,107,0.1);color:var(--red);}
.hot-badge{background:rgba(88,166,255,0.15);color:var(--blue);padding:2px 8px;
  border-radius:4px;font-size:0.7rem;font-weight:700;}
.loading{text-align:center;padding:60px;color:var(--muted);}
.empty{text-align:center;padding:60px;color:var(--muted);}

@media(max-width:900px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
  #adminScreen{padding:12px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo"><span class="w">Wibi</span><span class="l">low</span></div>
    <div class="login-sub">Admin Dashboard</div>
    <input type="password" id="passwordInput" class="login-input" placeholder="Enter admin password…">
    <button class="login-btn" onclick="login()">Sign in →</button>
    <div class="login-error" id="loginError">Incorrect password</div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <div class="admin-header">
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="admin-logo"><span class="w">Wibi</span><span class="l">low</span></div>
      <span class="admin-badge">Admin</span>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-val" id="statTotal">—</div><div class="stat-lbl">Total products</div></div>
    <div class="stat-card"><div class="stat-val" id="statCats">—</div><div class="stat-lbl">Categories</div></div>
    <div class="stat-card"><div class="stat-val" id="statAvgPrice">—</div><div class="stat-lbl">Avg sell price</div></div>
    <div class="stat-card"><div class="stat-val" id="statLowStock">—</div><div class="stat-lbl">Low stock (&lt;5)</div></div>
  </div>

  <div class="filters">
    <input type="text" class="filter-input" id="searchFilter" placeholder="Search products…" oninput="renderTable()">
    <select class="filter-input" id="catFilter" onchange="renderTable()">
      <option value="">All categories</option>
    </select>
    <select class="filter-input" id="sortFilter" onchange="renderTable()">
      <option value="hot">Hot first</option>
      <option value="priceLow">Price: low → high</option>
      <option value="priceHigh">Price: high → low</option>
      <option value="stock">Stock: low → high</option>
    </select>
  </div>

  <div class="table-wrap">
    <div class="loading" id="loadingMsg">Loading catalog…</div>
    <table id="productTable" style="display:none;">
      <thead>
        <tr>
          <th>Product</th>
          <th>Sell price</th>
          <th>Est. cost</th>
          <th>Est. profit</th>
          <th>Stock</th>
          <th>CJ Product ID</th>
          <th>CJ Link</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="empty" id="emptyMsg" style="display:none;">No products match your filters.</div>
  </div>
</div>

<script>
const ADMIN_PASSWORD = 'wibilow2026';
const CATALOG_URL = 'https://raw.githubusercontent.com/999666333HIM/-wibilow-site/refs/heads/main/catalog.json';
const CJ_PRODUCT_URL = 'https://app.cjdropshipping.com/product/detail.html?pid=';
const AVG_SHIPPING = 6;

let allProducts = [];

function login(){
  const pw = document.getElementById('passwordInput').value;
  if(pw === ADMIN_PASSWORD){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    loadCatalog();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

document.getElementById('passwordInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') login();
});

function logout(){
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('passwordInput').value = '';
}

async function loadCatalog(){
  try{
    const res = await fetch(CATALOG_URL + '?t=' + Date.now());
    const data = await res.json();
    allProducts = [];
    Object.entries(data).forEach(([key, items]) => {
      if(key === '__runIndex' || !Array.isArray(items)) return;
      items.forEach(p => allProducts.push(p));
    });
    populateCatFilter();
    updateStats();
    renderTable();
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('productTable').style.display = 'table';
  }catch(e){
    document.getElementById('loadingMsg').textContent = 'Failed to load catalog. ' + e.message;
  }
}

function estimateCost(sellPrice){
  // Reverse the markup formula: sellPrice = ceil((cost + 6) * 1.40)
  // So cost ≈ (sellPrice / 1.40) - 6
  return Math.max(0, ((sellPrice / 1.40) - AVG_SHIPPING)).toFixed(2);
}

function estimateProfit(sellPrice){
  const cost = parseFloat(estimateCost(sellPrice));
  const stripeFee = sellPrice * 0.029 + 0.30;
  return (sellPrice - cost - AVG_SHIPPING - stripeFee).toFixed(2);
}

function populateCatFilter(){
  const cats = [...new Set(allProducts.map(p => p.cat))].sort();
  const sel = document.getElementById('catFilter');
  cats.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    sel.appendChild(opt);
  });
}

function updateStats(){
  const cats = new Set(allProducts.map(p => p.cat));
  const avgPrice = allProducts.length ? (allProducts.reduce((s,p) => s + p.displayPrice, 0) / allProducts.length).toFixed(0) : 0;
  const lowStock = allProducts.filter(p => (p.stock||0) < 5).length;
  document.getElementById('statTotal').textContent = allProducts.length.toLocaleString();
  document.getElementById('statCats').textContent = cats.size;
  document.getElementById('statAvgPrice').textContent = '$' + avgPrice;
  document.getElementById('statLowStock').textContent = lowStock;
}

function renderTable(){
  const search = document.getElementById('searchFilter').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const sort = document.getElementById('sortFilter').value;

  let list = allProducts.filter(p => {
    if(cat && p.cat !== cat) return false;
    if(search && !p.name.toLowerCase().includes(search)) return false;
    return true;
  });

  if(sort === 'priceLow') list.sort((a,b) => a.price - b.price);
  else if(sort === 'priceHigh') list.sort((a,b) => b.price - a.price);
  else if(sort === 'stock') list.sort((a,b) => (a.stock||0) - (b.stock||0));
  else list.sort((a,b) => (b.hot?1:0) - (a.hot?1:0));

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  if(!list.length){
    document.getElementById('emptyMsg').style.display = 'block';
    document.getElementById('productTable').style.display = 'none';
    return;
  }
  document.getElementById('emptyMsg').style.display = 'none';
  document.getElementById('productTable').style.display = 'table';

  list.forEach(p => {
    const profit = parseFloat(estimateProfit(p.displayPrice));
    const profitClass = profit > 5 ? 'good' : profit > 0 ? 'ok' : 'bad';
    const stockClass = (p.stock||0) < 5 ? 'stock-low' : 'stock-high';
    const cost = estimateCost(p.displayPrice);

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <div style="display:flex;align-items:center;gap:10px;">
          ${p.thumbnail
            ? `<img src="${p.thumbnail}" class="product-thumb" alt="">`
            : `<div class="product-thumb-placeholder">${p.icon||'🛍️'}</div>`}
          <div>
            <div class="product-name" title="${p.name}">${p.name}</div>
            <div class="product-cat">${p.cat} ${p.hot ? '<span class="hot-badge">HOT</span>' : ''}</div>
          </div>
        </div>
      </td>
      <td><span class="price-sell mono">$${p.displayPrice}</span></td>
      <td><span class="price-cost mono">~$${cost} + $${AVG_SHIPPING} ship</span></td>
      <td><span class="profit ${profitClass} mono">${profit > 0 ? '+' : ''}$${profit}</span></td>
      <td><span class="stock-badge ${stockClass}">${p.stock||'?'} left</span></td>
     <td>
  <div style="display:flex;align-items:center;gap:6px;">
    <span class="cj-id" title="${p.cjPid||p.aliUrl||'N/A'}">${p.cjPid||'AliExpress'}</span>
    ${p.cjPid ? `<button class="copy-btn" onclick="copyId('${p.cjPid}',this)">Copy</button>` : ''}
  </div>
</td>
<td>
  ${p.cjPid
    ? `<a href="${CJ_PRODUCT_URL}${p.cjPid}" target="_blank" class="cj-link">View on CJ ↗</a>`
    : p.aliUrl
    ? `<a href="${p.aliUrl}" target="_blank" class="cj-link">View on AliExpress ↗</a>`
    : '<span style="color:var(--muted);font-size:0.78rem;">No link</span>'}
</td>
    `;
    tbody.appendChild(tr);
  });
}

function copyId(id, btn){
  navigator.clipboard.writeText(id).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}
</script>
</body>
</html>
