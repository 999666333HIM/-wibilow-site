<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed — Wibilow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  body{
    margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#FAFAF8;font-family:'Nunito',sans-serif;color:#2D1B4E;text-align:center;
  }
  .card{max-width:420px;padding:48px 36px;background:#fff;border-radius:24px;
    border:1.5px solid #E8E3F0;box-shadow:0 2px 16px rgba(45,27,78,0.08);}
  .icon{font-size:3rem;margin-bottom:16px;}
  h1{font-family:'DM Serif Display',serif;font-size:1.8rem;margin:0 0 12px;}
  p{color:#6B6280;font-size:0.95rem;line-height:1.6;margin:0 0 24px;}
  a{display:inline-block;background:#FF6B47;color:#fff;text-decoration:none;
    padding:13px 28px;border-radius:999px;font-weight:800;font-size:0.92rem;}
</style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>Order confirmed!</h1>
    <p>Thanks for shopping with Wibilow. A confirmation email is on its way, and your order will ship soon.</p>
    <a href="/">Back to store</a>
  </div>
</body>
</html>
